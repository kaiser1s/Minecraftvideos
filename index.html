<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unstable SMP Hub | Netflix Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="netflix-nav">
        <div class="logo">UNSTABLE HUB</div>
        <div class="tabs">
            <span class="tab active" onclick="filterBy('all', event)">All</span>
            <span class="tab" onclick="filterBy('Wemmbu', event)">Wemmbu</span>
            <span class="tab" onclick="filterBy('Parrot', event)">Parrot</span>
            <span class="tab" onclick="filterBy('Spoke', event)">Spoke</span>
            <span class="tab" onclick="filterBy('FlameFrags', event)">FlameFrags</span>
        </div>
    </nav>

    <main class="content">
        <section class="video-row">
            <h2 id="row-title">Recently Uploaded</h2>
            <div class="posters-grid" id="video-grid">
                <p class="loading">Loading chaos...</p>
            </div>
        </section>
    </main>

    <div id="theater-mode" class="theater-overlay">
        <button class="close-btn" onclick="closeTheater()">✕ Close</button>
        
        <div id="theater-disclaimer" class="theater-disclaimer">
            <div class="disclaimer-text">
                <span class="warning">NOTICE</span>
                <p>This video is owned by <span id="current-creator">Creator</span>.</p>
                <p class="sub-text">This is a fan-curated experience. All rights belong to the original producer.</p>
            </div>
        </div>

        <iframe id="theater-player" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
