<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unstable Hub | Ad-Free</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="netflix-nav">
        <div class="logo">UNSTABLE HUB</div>
        <div class="tabs">
            <span class="tab active" onclick="filterBy('all', event)">All</span>
            <span class="tab" onclick="filterBy('Wemmbu', event)">Wemmbu</span>
            <span class="tab" onclick="filterBy('Parrot', event)">Parrot</span>
            <span class="tab" onclick="filterBy('Spoke', event)">Spoke</span>
            <span class="tab" onclick="filterBy('FlameFrags', event)">FlameFrags</span>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="hero-content">
            <h1 class="hero-title">UNSTABLE SMP</h1>
            <p class="hero-desc">Experience the civilization chaos without interruptions. Ad-free streaming for the Unstable crew.</p>
        </div>
        <div class="hero-vignette"></div>
    </header>

    <main class="content-area">
        <h2 class="row-header" id="current-category">Latest Episodes</h2>
        <div class="posters-grid" id="video-grid">
            <div class="loading">Bypassing ads and loading content...</div>
        </div>
    </main>

    <div id="theater-mode" class="theater-overlay">
        <div class="controls-top">
            <button class="close-btn" onclick="closeTheater()">✕ Back to Browse</button>
        </div>
        <iframe id="theater-player" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
